name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pyflakes
        run: pip install pyflakes

      - name: Compile check
        run: python3 -m py_compile src/voxfox_core/*.py src/voxfox_gtk.py

      - name: Pyflakes
        run: |
          python3 -m pyflakes src/voxfox_core/*.py src/voxfox_gtk.py 2>&1 \
            | grep "undefined name '" && exit 1 || exit 0
