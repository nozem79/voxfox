name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set APP_VERSION in source
        run: |
          sed -i "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" src/voxfox_gtk.py

      - name: Install build dependencies
        run: sudo apt-get install -y fakeroot dpkg-dev

      - name: Build .deb
        run: VERSION=$VERSION bash packaging/build-deb.sh

      - name: Extract changelog section
        id: changelog
        run: |
          python3 - <<'PYEOF'
          import re, os
          ch = open("CHANGELOG.md").read()
          m = re.search(r"## " + os.environ["VERSION"] + r"\n(.*?)(?=\n## |\Z)", ch, re.S)
          notes = m.group(1).strip() if m else ""
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"notes<<ENDOFNOTES\n{notes}\nENDOFNOTES\n")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: voxfox_${{ env.VERSION }}_all.deb
